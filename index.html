<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#1e88e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PAKKYAWA" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <title>PAKKYAWA Adventure Ver1.1</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#111827;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}#app{position:fixed;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 0,#435b81 0,#111827 60%,#080b10 100%)}canvas{width:min(100vw,calc(100vh * 16 / 9));height:min(100vh,calc(100vw * 9 / 16));border-radius:18px;background:#8ad8ff;box-shadow:0 22px 56px rgba(0,0,0,.42);touch-action:none}.controls{position:fixed;left:0;right:0;bottom:max(16px,env(safe-area-inset-bottom));display:flex;justify-content:space-between;align-items:flex-end;padding:0 24px;pointer-events:none}.pad{display:flex;gap:14px;pointer-events:auto}.btn{width:72px;height:72px;border-radius:999px;border:3px solid rgba(255,255,255,.86);background:rgba(0,0,0,.32);color:#fff;font-weight:900;font-size:28px;display:grid;place-items:center;box-shadow:0 10px 24px rgba(0,0,0,.28);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}.btn.jump{width:92px;height:92px;font-size:24px;background:rgba(255,210,0,.36)}.btn:active{transform:translateY(3px) scale(.98);background:rgba(255,255,255,.25)}@media (hover:hover) and (pointer:fine){.controls{opacity:.72}}@media (max-height:430px){canvas{border-radius:0}.btn{width:60px;height:60px}.btn.jump{width:76px;height:76px;font-size:20px}.controls{bottom:10px}}
  </style>
</head>
<body>
  <div id="app"><canvas id="game" width="960" height="540"></canvas></div>
  <div class="controls" aria-label="スマホ操作">
    <div class="pad"><button id="btnLeft" class="btn">←</button><button id="btnRight" class="btn">→</button></div>
    <div class="pad"><button id="btnJump" class="btn jump">JUMP</button></div>
  </div>
  <script src="audio.js"></script>
  <script src="app.js"></script>
</body>
</html>
