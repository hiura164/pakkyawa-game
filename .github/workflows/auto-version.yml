name: Auto Version Bump

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    if: ${{ !contains(github.event.head_commit.message, '[skip version]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version by 0.1
        id: bump
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          version_path = Path('VERSION')
          current = version_path.read_text(encoding='utf-8').strip() if version_path.exists() else '1.0'
          try:
              major, minor = current.split('.')
              next_version = f'{int(major)}.{int(minor) + 1}'
          except Exception:
              next_version = '1.1'

          version_path.write_text(next_version + '\n', encoding='utf-8')

          replacements = {
              'index.html': [
                  (r'PAKKYAWA Adventure Ver\d+\.\d+', f'PAKKYAWA Adventure Ver{next_version}'),
              ],
              'app.js': [
                  (r'Loading Ver\d+\.\d+\.\.\.', f'Loading Ver{next_version}...'),
              ],
              'manifest.json': [
                  (r'横スクロール王冠アクションゲーム Ver\d+\.\d+', f'横スクロール王冠アクションゲーム Ver{next_version}'),
              ],
              'README.md': [
                  (r'PAKKYAWA Adventure Ver\d+\.\d+', f'PAKKYAWA Adventure Ver{next_version}'),
              ],
              'sw.js': [
                  (r"pakkyawa-adventure-v[0-9A-Za-z_.-]+", f'pakkyawa-adventure-v{next_version.replace(".", "-")}'),
              ],
          }

          for file_name, rules in replacements.items():
              path = Path(file_name)
              if not path.exists():
                  continue
              text = path.read_text(encoding='utf-8')
              original = text
              for pattern, repl in rules:
                  text = re.sub(pattern, repl, text)
              if text != original:
                  path.write_text(text, encoding='utf-8')

          print(next_version)
          Path('version_bump_output.txt').write_text(next_version, encoding='utf-8')
          PY
          echo "version=$(cat version_bump_output.txt)" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          if git diff --quiet; then
            echo "No version changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION index.html app.js manifest.json README.md sw.js
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }} [skip version]"
          git push
